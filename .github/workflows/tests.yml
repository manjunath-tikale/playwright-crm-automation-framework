name: Playwright Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npm test
      continue-on-error: true
      env:
        BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:4200' }}
        TEST_USERNAME: ${{ secrets.TEST_USERNAME || 'admin@admin.com' }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'admin' }}

    - name: Upload HTML Report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 30

    - name: Comment PR with test results
      uses: actions/github-script@v6
      if: always() && github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const testResultsPath = './test-results';
          
          if (fs.existsSync(testResultsPath)) {
            const files = fs.readdirSync(testResultsPath);
            const testFiles = files.filter(f => f.endsWith('.json'));
            
            if (testFiles.length > 0) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `✅ Playwright tests completed!\n\nCheck the artifacts for detailed results and HTML reports.`
              });
            }
          }
